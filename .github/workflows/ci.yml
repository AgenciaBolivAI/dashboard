name: CI

# Smoke test: blocks merges/pushes that introduce type errors (the regressions
# that `typescript.ignoreBuildErrors` used to hide). The full production build
# is gated separately by Vercel (which now type-checks too).
#
# Uses the Node 24-runtime actions (checkout@v5 / setup-node@v5). The older @v4
# actions run on Node 20, which GitHub started removing from the runners on
# 2026-06-16 — that was failing every run.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Typecheck (hard gate)
        run: npm run typecheck
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true
